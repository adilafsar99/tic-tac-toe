<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<script src="script.js" defer></script>
		<title>Tic Tac Toe</title>
	</head>
	<body>
		<main class="container">
			<div class="title-div">
				<h1 id="title">Tic-Tac-Toe</h1>
			</div>
			<div class="setup-screen-div">
				<div class="player-setup-div">
					<div class="player-field-div">
						<input
							class="player-one player-name-field"
							type="text"
							value="Player One"
							maxlength="12"
						/>
						<button class="player-one ai-button">AI</button>
					</div>
					<div class="mark-buttons-div player-one-marks">
						<button class="player-one mark-button">X</button>
						<button class="player-one mark-button">O</button>
					</div>
				</div>
				<div class="start-button-div">
					<button id="start-button">Start</button>
				</div>
				<div class="player-setup-div">
					<div class="player-field-div">
						<input
							class="player-two player-name-field"
							type="text"
							value="Player Two"
							maxlength="12"
						/>
						<button class="player-two ai-button">AI</button>
					</div>
					<div class="mark-buttons-div">
						<button class="player-two mark-button">X</button>
						<button class="player-two mark-button">O</button>
					</div>
				</div>
				<div class="message"></div>
			</div>
			<div class="game-screen-div">
				<div class="player-info-div">
					<div class="player-info-columns">
						<div class="player-name-div column">
							<p class="player-name-heading">Player</p>
							<p class="player-name" id="player-one-name">Player One</p>
						</div>
						<div class="player-mark-div column">
							<p class="player-mark-heading">Mark</p>
							<p class="player-mark" id="player-one-mark">X</p>
						</div>
						<div class="player-score-div column">
							<p class="player-score-heading">Score</p>
							<p class="player-score" id="player-one-score">1</p>
						</div>
					</div>
					<div class="player-info-columns">
						<div class="player-name-div column">
							<p class="player-name-heading">Player</p>
							<p class="player-name" id="player-two-name">Player One</p>
						</div>
						<div class="player-mark-div column">
							<p class="player-mark-heading">Mark</p>
							<p class="player-mark" id="player-two-mark">X</p>
						</div>
						<div class="player-score-div column">
							<p class="player-score-heading">Score</p>
							<p class="player-score" id="player-two-score">1</p>
						</div>
					</div>
				</div>
				<div class="gameboard"></div>
				<div class="game-info-div">
					<div class="game-info-columns">
						<div class="round-div column">
							<p class="round-heading">Round</p>
							<p id="round">1</p>
						</div>
						<div class="turn-div column">
							<p class="turn-heading">Turn</p>
							<p id="turn">1</p>
						</div>
					</div>
				</div>
			</div>
		</main>
	</body>
</html>
