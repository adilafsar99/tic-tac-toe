<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<script src="script.js" defer></script>
		<title>Tic Tac Toe</title>
	</head>
	<body>
		<main class="container">
			<div class="title-div">
				<h1 id="title">Tic-Tac-Toe</h1>
			</div>
			<div class="setup-screen-div">
				<div class="player-setup-div">
					<div class="player-one player-field-div">
						<input class="player-name-field" type="text" value="Player One" />
						<button class="ai-button">AI</button>
					</div>
					<div class="mark-buttons-div player-one-marks">
						<button class="mark-button">X</button>
						<button class="mark-button">O</button>
					</div>
				</div>
				<div class="start-button-div">
					<button id="start-button">Start</button>
				</div>
				<div class="player-two player-setup-div">
					<div class="player-field-div">
						<input class="player-name-field" type="text" value="Player Two" />
						<button class="ai-button">AI</button>
					</div>
					<div class="mark-buttons-div">
						<button class="mark-button">X</button>
						<button class="mark-button">O</button>
					</div>
				</div>
			</div>
			<div class="game-screen-div"></div>
		</main>
	</body>
</html>
